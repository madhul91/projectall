- name: Deploy App to Minikube
  hosts: all
  become: true

  tasks:

    - name: Update packages
      apt:
        update_cache: yes

    - name: Install Docker
      apt:
        name: docker.io
        state: present

    - name: Start Docker
      service:
        name: docker
        state: started
        enabled: true

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    # -------- INSTALL MINIKUBE --------
    - name: Download Minikube
      get_url:
        url: https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64
        dest: /usr/local/bin/minikube
        mode: '0755'

    # -------- INSTALL KUBECTL --------
    - name: Install kubectl
      snap:
        name: kubectl
        classic: yes

    # -------- START MINIKUBE --------
    - name: Start Minikube
      become_user: ubuntu
      command: minikube start --driver=docker --force
      environment:
        CHANGE_MINIKUBE_NONE_USER: true

    # -------- VERIFY CLUSTER --------
    - name: Check Nodes
      become_user: ubuntu
      command: kubectl get nodes

    # -------- DEPLOY APP --------
    - name: Apply Deployment
      become_user: ubuntu
      command: kubectl apply -f kubernetes/deployment.yml

    - name: Apply Service
      become_user: ubuntu
      command: kubectl apply -f kubernetes/service.yml

    - name: Update Image
      become_user: ubuntu
      command: kubectl set image deployment/static-website node-container={{ image }}

    - name: Wait for Rollout
      become_user: ubuntu
      command: kubectl rollout status deployment/static-website
