- name: Auto Deploy Docker Container
  hosts: all
  become: true

  tasks:

    - name: Update packages
      apt:
        update_cache: yes

    - name: Install Docker
      apt:
        name: docker.io
        state: present

    - name: Start Docker
      service:
        name: docker
        state: started
        enabled: true

    - name: Pull Docker Image
      command: docker pull {{ image }}

    - name: Stop old container
      command: docker stop mycloud
      ignore_errors: yes

    - name: Remove old container
      command: docker rm mycloud
      ignore_errors: yes

    - name: Run new container
      command: docker run -d -p 8098:80 --restart always --name mycloud {{ image }}
